pre-commit:
  parallel: true
  jobs:
    - root: "front-end/"
      stage_fixed: true
      exclude:
        - "*.js"
        - "*.ts"
        - "*.cjs"
        - "*.mjs"
        - "*.d.cts"
        - "*.d.mts"
        - "*.jsx"
        - "*.tsx"
        - "*.vue"
      group:
        piped: true
        jobs:
          - run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
          - run: bunx biome format --write --no-errors-on-unmatched {staged_files}

    - root: "front-end/"
      stage_fixed: true
      glob:
        - "*.js"
        - "*.ts"
        - "*.cjs"
        - "*.mjs"
        - "*.d.cts"
        - "*.d.mts"
        - "*.jsx"
        - "*.tsx"
        - "*.vue"
      group:
        piped: true
        jobs:
          - run: bunx biome check --files-ignore-unknown=true {staged_files}
          - run: bunx biome check --write --no-errors-on-unmatched {staged_files}
          - run: bunx biome check --write --unsafe --no-errors-on-unmatched {staged_files}
          - run: bunx biome format --write --no-errors-on-unmatched {staged_files}
          - run: bunx biome lint --write --no-errors-on-unmatched {staged_files}